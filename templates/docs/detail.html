{% extends 'base.html' %}

{% block title %}{{ doc.title }} — Dokumenty{% endblock %}

{% block content %}
  <h1>{{ doc.title }}</h1>

  {% if doc.category %}
    <p><strong>Kategoria:</strong> {{ doc.category }}</p>
  {% endif %}

  <div style="border:1px solid #eee; border-radius:12px; overflow:hidden;">
    <iframe
      src="{{ doc.file_url }}"
      width="100%"
      height="900"
      style="border:0; display:block;"
      loading="lazy">
    </iframe>
  </div>

  <p style="margin-top: 1rem;">
    <a href="{{ doc.file_url }}" target="_blank" rel="noopener">Otwórz w nowej karcie</a>
    •
    <a href="{% url 'docs_list' %}">Wróć do listy</a>
  </p>
{% endblock %}
